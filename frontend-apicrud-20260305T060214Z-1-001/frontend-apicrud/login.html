<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Restaurante — Iniciar Sesión</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800,900" rel="stylesheet" />
  <link href="css/sb-admin-2.min.css" rel="stylesheet" />
  <link href="css/custom.css" rel="stylesheet" />
</head>
<body class="bg-gradient-primary">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-10 col-lg-12 col-md-9">
        <div class="card o-hidden border-0 shadow-lg my-5">
          <div class="card-body p-0">
            <div class="row">
              <div class="col-lg-6 d-none d-lg-block bg-login-image"></div>
              <div class="col-lg-6">
                <div class="p-5">
                  <div class="text-center mb-4">
                    <h1 class="h4 text-gray-900">¡Bienvenido!</h1>
                    <p class="text-muted small">Ingresa tus credenciales para continuar</p>
                  </div>
                  <div id="alertaError" class="alert alert-danger d-none" role="alert">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="mensajeError"></span>
                  </div>
                  <form id="formularioLogin" class="user">
                    <div class="form-group">
                      <input type="text" id="inputUsuario" class="form-control form-control-user"
                        placeholder="Nombre de usuario" autocomplete="username" required />
                    </div>
                    <div class="form-group">
                      <input type="password" id="inputContrasena" class="form-control form-control-user"
                        placeholder="Contraseña" autocomplete="current-password" required />
                    </div>
                    <button id="btnLogin" type="submit" class="btn btn-primary btn-user btn-block">
                      <span id="textoBtn"><i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesión</span>
                      <span id="loadingBtn" class="d-none"><i class="fas fa-spinner fa-spin mr-2"></i>Verificando...</span>
                    </button>
                  </form>
                  <hr />
                  <div class="text-center">
                    <a class="small" href="register.html">¿No tienes cuenta? <strong>Regístrate aquí</strong></a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
  <script src="js/sb-admin-2.min.js"></script>
  <script src="js/apiService.js"></script>
  <script src="js/sessionService.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
